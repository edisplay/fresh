<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh — web UI (real render pipeline)</title>
<!--
  Non-terminal UI for Fresh. The REAL editor render pipeline decides what to draw;
  this frontend only re-targets the final drawing:
    - buffer interiors  -> the real syntax-highlighted CELLS the pipeline drew in
                           each pane's content_rect (drawn here as SVG text).
    - chrome            -> NATIVE UI elements built from the *semantic* model the
                           pipeline already computed (menu tree, tabs, status
                           segments). No chrome is drawn from cells.
  The editor stays the single source of truth: every chrome interaction is
  forwarded back through the real Editor::handle_mouse at the cell coordinates
  the pipeline reported, so highlight / selection / open / close all match the
  TUI and GUI exactly.
  Transport: a WebSocket (/ws) pushes scene region diffs from the server and
  carries all input; the HTTP routes remain for curl / the parity harness.
  Served by the bridge that hosts a real Editor (built into `fresh` behind the
  `web` feature, which also embeds this file):
    fresh --web 127.0.0.1:8139 <files…>          # installed binary
    cargo run --features web -p fresh-editor --example webui_server -- 127.0.0.1:8139 <files…>
-->
<style>
  /* ---- typography: ONE family, ONE size, for every pixel of the UI --------
     The buffer is a cell grid, so the shared family has to be the monospace
     stack; chrome (menus, tabs, status, palette, modals, widgets) inherits the
     exact same family and size, which also makes the native chrome's text
     advance agree with the cell widths the editor computed server-side.
     --font-size-base is the single source of truth and is read back by JS
     (see BASE_FONT); --font-size is the *live* size — measureMetrics() rewrites
     it as zoom changes so chrome scales with the buffer. Everything downstream
     sizes itself in em, never px. */
  :root{
    --font-family:ui-monospace,SFMono-Regular,JetBrains Mono,Menlo,Consolas,monospace;
    --font-size-base:13px;
    --font-size:var(--font-size-base);
    --line-height:1.4}
  :root{--bg:#10161f;--bg2:#151d29;--bg3:#0c121b;--fg:#d7e0ea;--muted:#8494a8;
    --accent:#2fd6c3;--border:#233043;--menuhi:#11675c;
    --status-bg:#0c121b;--status-fg:#8fa0b3;
    /* Readable text/fill for anything painted ON the accent colour. Recomputed
       per theme in applyTheme() so e.g. high-contrast's white accent gets dark
       text instead of the white-on-white it used to render. */
    --on-accent:#04201c;--on-sel:var(--fg);
    /* Chrome identity tokens (independent of the buffer theme): the teal the
       shell is branded with, its readable on-colour, and the "healthy" green
       of the status-bar connection dot. Fixed by design — the buffer theme
       keeps owning every cell, but the frame always speaks this accent. */
    --ui-accent:#2fd6c3;--on-ui-accent:#04201c;--ok:#3ecf8e;
    /* Frame-chrome surface (sidebar/menu/tabs/status): the buffer bg pulled
       toward deep navy so the frame reads darker than the editor, as in the
       target design. applyTheme() re-derives it from the live theme bg. */
    --shell:color-mix(in srgb, var(--bg) 55%, #060b13)}
  /* Theme-derived design tokens: elevated surfaces and soft hairlines mixed from
     the live --bg/--fg, so chrome reads as depth on ANY theme instead of piping
     the terminal palette's hard borders (e.g. high-contrast's cyan) into the UI.
     color-mix re-evaluates when applyTheme() updates --bg/--fg. */
  :root{
    --surface:color-mix(in srgb, var(--bg) 92%, var(--fg));
    --surface-2:color-mix(in srgb, var(--bg) 84%, var(--fg));
    --hairline:color-mix(in srgb, var(--fg) 14%, transparent);
    --hairline-strong:color-mix(in srgb, var(--fg) 26%, transparent);
    --hover:color-mix(in srgb, var(--fg) 9%, transparent);
    --shadow:0 16px 50px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35)}
  *{box-sizing:border-box}
  :focus{outline:none}
  html,body{height:100%;margin:0}
  body{height:100vh;background:var(--bg);color:var(--fg);overflow:hidden;
    font:var(--font-size)/var(--line-height) var(--font-family);-webkit-font-smoothing:antialiased;user-select:none;
    /* One chrome glyph == one grid cell (see measureMetrics/--cell-tracking), so
       native chrome text lines up with the CW-pitch SVG buffer. */
    letter-spacing:var(--cell-tracking,0)}
  /* No element re-declares a family, and any element that needs a size states it
     in em relative to the inherited base. */
  input,button,textarea,select{font:inherit}
  #app{position:relative;width:100vw;height:100vh}
  .region{position:absolute;overflow:hidden}

  /* ---- menu bar (native) ---- */
  .menubar{display:flex;align-items:center;gap:0;background:var(--bg3);
    border-bottom:1px solid var(--border);padding:0 4px}
  .menu{padding:0 10px;height:100%;display:flex;align-items:center;border-radius:0;color:var(--fg);cursor:default}
  .menu:hover{background:#454545}
  .menu.open{background:var(--menuhi);color:#fff}

  /* ---- menu dropdown (native, positioned at the pipeline's item rects) ---- */
  /* decorative backing panel sits BEHIND the rows and never eats clicks */
  .dropdown{position:absolute;z-index:70;pointer-events:none;background:#2b2b2b;
    border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  /* Submenu panels sit edge-to-edge with their parent; offset the drop shadow
     to the right so it doesn't darken the parent panel across the seam. */
  .dropdown.submenu{box-shadow:8px 14px 40px rgba(0,0,0,.45)}
  .mitem,.msep,.mlabel{position:absolute;z-index:81}
  .mitem{display:flex;align-items:center;gap:18px;padding:0 14px;white-space:nowrap;cursor:default;color:var(--fg)}
  .mitem.hi{background:var(--menuhi);color:#fff}
  .mitem.disabled{color:#6a6a6a}
  .mitem .lab{flex:1;display:flex;align-items:center;gap:6px}
  .mitem .accel{color:var(--muted)}
  .mitem.hi .accel{color:#dfe8ff}
  .mitem .arrow{color:var(--muted)}
  .mitem .check{width:12px;display:inline-block;text-align:center}
  .msep{height:1px;background:#4a4a4a;margin:4px 8px}
  .mlabel{padding:0 14px;color:var(--muted);font-style:italic}

  /* ---- tabs (native) ---- */
  .tabbar{display:flex;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden}
  /* No max-width and no icon: a tab is as wide as the TUI already made it
     (`tab_area` = the full " name × " it laid out — see view/ui/tabs.rs), so
     names show in full and only the .tabbar's own overflow:hidden clips the
     edge tab when the bar is full, exactly like the terminal. */
  .tab{display:flex;align-items:center;gap:6px;padding:0 8px;border-right:1px solid var(--border);
    color:var(--muted);background:var(--bg2);cursor:default}
  .tab.active{color:var(--fg);background:var(--bg)}
  .tab .name{overflow:hidden;text-overflow:clip;white-space:nowrap}
  /* Modified marker only occupies space when shown (the TUI likewise spends a
     cell on it only when dirty), so a clean tab isn't padded by a hidden dot. */
  .tab .dot{width:8px;height:8px;border-radius:50%;background:var(--fg);flex:0 0 auto;display:none}
  .tab.modified .dot{display:inline-block}
  .tab .x{width:16px;height:16px;border-radius:4px;text-align:center;line-height:15px;color:var(--muted);flex:0 0 auto}
  .tab .x:hover{background:#5a5a5a;color:#fff}

  /* ---- status bar (native) ---- */
  .statusbar{display:flex;align-items:center;background:var(--status-bg);color:var(--status-fg);
    padding:0 10px;gap:0;white-space:pre}
  .statusbar .txt{padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw}
  .statusbar .seg{padding:0 8px;border-radius:3px;cursor:default}
  .statusbar .seg:hover{background:rgba(255,255,255,.18)}

  /* ---- command palette / picker (native) ---- */
  .palette{position:absolute;z-index:90;display:flex;flex-direction:column;
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden}
  .palette.with-preview{overflow:hidden}
  /* Centered-modal placement (paletteCentered): float the palette as a modal
     panel over the whole view instead of the bottom sheet. Placement is CSS-
     driven — the card is centered by transform and capped by max-width/height,
     with a `.modal-scrim` behind it (emitted by the palette region filler).
     A preview overlay keeps its cell-derived width (set inline) so the results
     column still lines up with the framed preview beside it. */
  .palette.centered{left:50%;top:50%;bottom:auto;transform:translate(-50%,-50%);
    z-index:96;width:min(880px,94vw);max-width:94vw;max-height:84vh;
    /* Stained-glass: a translucent surface with a heavy backdrop blur so the
       editor behind it reads through as frosted colour, not a flat panel. */
    background:color-mix(in srgb, var(--bg2) 68%, transparent);
    backdrop-filter:blur(22px) saturate(1.7);-webkit-backdrop-filter:blur(22px) saturate(1.7);
    border:1px solid var(--hairline-strong);box-shadow:0 28px 90px rgba(0,0,0,.62)}
  /* Roomier list — a min-height keeps the modal a substantial panel even when
     only a few commands match, instead of collapsing to a tiny box. The cap is
     a pure viewport fraction (no fixed pixel ceiling) so a tall display shows
     more rows; the WIDTH stays capped above, which is the point of a palette. */
  .palette.centered .plist{max-height:66vh;min-height:330px}
  /* Let the frosted surface show through the header rows (they'd otherwise be
     painted opaque by their own --bg / --bg2 fills). */
  .palette.centered .pinput{background:transparent}
  /* Title bar: label on the left, a close 'x' on the right. */
  .palette.centered .ptitlebar{display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:8px 8px 8px 14px;border-bottom:1px solid var(--hairline);
    color:var(--fg);font-weight:600;flex:0 0 auto}
  .palette.centered .ptitlebar .ptbtext{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .palette.centered .ptitlebar .ptbclose{cursor:pointer;color:var(--muted);flex:0 0 auto;
    width:24px;height:24px;line-height:23px;text-align:center;border-radius:6px;font-size:15px}
  .palette.centered .ptitlebar .ptbclose:hover{background:var(--hover);color:var(--fg)}
  .palette .pbody{display:flex;align-items:stretch;min-height:0}
  .palette .pbody .plist{max-height:none;border-right:1px solid var(--border)}
  .palette .ppreview{background:var(--bg);overflow:hidden}
  .palette .ppreview svg.cells{width:100%;height:100%}
  .palette .pinput{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
  .palette .pinput .pmsg{color:var(--muted);white-space:pre;flex:0 0 auto}
  /* The input line never ellipsises: the TUI already fits the prompt to the row,
     so we show the query in full and, if it's longer than the box, scroll it to
     the caret (scrollToCaret) — the terminal's own behaviour — instead of
     hiding the tail behind a "…". */
  .palette .pinput .q{flex:1;color:var(--fg);white-space:pre;overflow:hidden;text-overflow:clip}
  .palette.input-only .pinput .q{flex:1}
  .palette .pinput .q .caret2{display:inline-block;width:1px;background:#aeafad;animation:blink 1.05s steps(1) infinite}
  .palette .pinput .status{color:var(--muted)}
  .palette .pinput .count{color:var(--muted)}
  .palette .plist{overflow-y:auto;max-height:50vh;padding:4px 0}
  .palette .prow{display:flex;align-items:center;gap:10px;padding:3px 12px;cursor:default;color:var(--fg)}
  .palette .prow.sel{background:var(--menuhi);color:#fff}
  .palette .prow.disabled{color:#6a6a6a}
  .palette .prow .ptext{flex:0 0 auto}
  .palette .prow .pdesc{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .palette .prow.sel .pdesc{color:#dfe8ff}
  .palette .prow .pkey{color:var(--muted);border:1px solid #555;border-radius:3px;padding:0 5px}
  .palette .prow.sel .pkey{color:#fff;border-color:#9bbcf0}
  .palette .ptitle{padding:6px 12px;color:var(--muted);border-bottom:1px solid #3a3a3a}
  /* Sidebar is chrome/frame — match the menu bar's neutral surface (--bg3),
     not the popup surface (--bg2), which in some light themes is a tinted
     blue-grey that clashes with the neutral bar and the white buffer. */
  .fileexplorer{background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .fileexplorer .fx-title{padding:2px 8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 0 auto}
  .fileexplorer .fx-list{overflow:auto;flex:1}
  .fileexplorer .fx-row{display:flex;align-items:center;gap:4px;padding:0 6px;white-space:nowrap;cursor:default;color:var(--fg);line-height:1.5}
  .fileexplorer .fx-row.sel{background:var(--menuhi);color:#fff}
  .fileexplorer .fx-row .fx-chev{width:10px;flex:0 0 auto;color:var(--muted);text-align:center}
  .fileexplorer .fx-row.sel .fx-chev{color:#fff}
  .fileexplorer .fx-row .fx-name{overflow:hidden;text-overflow:ellipsis}
  .fileexplorer .fx-row .fx-name.dir{font-weight:600}
  .pane-content{background:var(--bg)}
  /* Gutter (line numbers + separator) is its own element, kept out of the
     buffer-text flow and non-selectable, so a future native text selection of
     the buffer won't pick up line numbers. */
  .pane-gutter{background:var(--bg);user-select:none;-webkit-user-select:none}
  .separator{background:var(--border)}
  .separator:hover{background:var(--accent)}
  .resize-grip{position:absolute;z-index:97;cursor:col-resize}
  .resize-grip:hover{background:var(--accent);opacity:.5}
  .scrollbar{background:transparent}
  .thumb{position:absolute;right:1px;width:8px;border-radius:4px;background:#5a5a5a}
  .thumb:hover{background:#7a7a7a}
  .caret{position:absolute;background:#aeafad;width:2px;z-index:40;animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  /* ---- workspace-trust dialog (native modal) ---- */
  .modal-scrim{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:95}
  .trustdialog{position:absolute;z-index:96;background:#2b2b2b;border:1px solid #5a5a5a;
    border-radius:8px;box-shadow:0 20px 70px rgba(0,0,0,.6);overflow:auto;display:flex;flex-direction:column;padding:10px 14px;min-width:420px}
  .trustdialog .td-title{color:#e5c07b;font-weight:700;margin-bottom:6px}
  .trustdialog .td-path{color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trustdialog .td-triggers{color:var(--muted);margin:2px 0 8px}
  .trustdialog .td-opt{display:flex;gap:8px;align-items:flex-start;padding:5px 8px;border-radius:5px;cursor:default}
  .trustdialog .td-opt.sel{background:var(--menuhi);color:#fff}
  .trustdialog .td-opt .td-radio{flex:0 0 auto}
  .trustdialog .td-opt .td-otext .td-olabel{font-weight:600}
  .trustdialog .td-opt .td-otext .td-odesc{color:var(--muted)}
  .trustdialog .td-opt.sel .td-odesc{color:#dfe8ff}
  .trustdialog .td-buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
  .trustdialog .td-btn{padding:3px 14px;border:1px solid #5a5a5a;border-radius:5px;cursor:default;color:var(--fg)}
  .trustdialog .td-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ---- plugin widgets (WidgetSpec) ---- */
  .ptoolbar{padding:4px 8px;border-bottom:1px solid var(--border)}
  .w-row{display:flex;flex-direction:row;align-items:center;gap:8px;flex-wrap:nowrap}
  .w-row.wrap{flex-wrap:wrap}
  .w-col{display:flex;flex-direction:column;gap:4px}
  .w-toggle{display:inline-flex;align-items:center;gap:6px;cursor:default;padding:1px 4px;border-radius:4px}
  .w-toggle.on{color:var(--accent)}
  /* Sliding switch, identical geometry to the Settings `.set-switch`.
     On-state uses --ui-accent (the brandable teal), NOT --accent — that's
     the cursor colour, which is white in the stock dark theme and would
     render a white pill with an invisible white knob. */
  .w-toggle .w-box{width:26px;height:14px;border-radius:8px;background:#555;position:relative;display:inline-block;flex:0 0 auto;transition:background .1s}
  .w-toggle .w-box::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#ccc;transition:left .1s}
  .w-toggle.on .w-box{background:var(--ui-accent,var(--accent))}
  .w-toggle.on .w-box::after{left:14px;background:var(--on-ui-accent,#fff)}
  .w-toggle.focus,.w-button.focus{outline:1px solid var(--accent)}
    .w-button{cursor:default;padding:1px 10px;border:1px solid #5a5a5a;border-radius:4px;color:var(--fg)}
  .w-button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .w-button.danger{border-color:#c0392b;color:#e57373}
  .w-button.disabled{opacity:.5}
  .w-divider{border-top:1px solid var(--border);margin:4px 0;align-self:stretch}
  .w-hintbar{display:flex;gap:12px;color:var(--muted)}
  .w-hint b{color:var(--accent);font-weight:600}
  .w-section{border:1px solid var(--border);border-radius:6px;padding:6px}
  .w-section-label{color:var(--muted);margin-bottom:4px}
  .w-raw{white-space:pre}
  .w-unsupported{color:var(--muted);font-style:italic}
  .w-text{display:flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:4px;padding:1px 6px;background:var(--bg)}
  .w-text.focus{outline:1px solid var(--accent)}
  .w-text-label{color:var(--muted)}
  .w-list{display:flex;flex-direction:column;overflow:auto}
  .w-list-row{padding:1px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;border-radius:3px}
  .w-list-row.sel{background:var(--menuhi);color:#fff}
  .w-list-empty{color:var(--muted);font-style:italic;padding:2px 6px}
  .w-tree{display:flex;flex-direction:column;overflow:auto}
  .w-tree-row{padding:1px 6px;white-space:pre;overflow:hidden;text-overflow:ellipsis;cursor:default;border-radius:3px}
  .w-tree-row.sel{background:var(--menuhi);color:#fff}
  .w-tree-disc,.w-tree-check{color:var(--muted)} .w-tree-row.sel .w-tree-disc,.w-tree-row.sel .w-tree-check{color:#dfe8ff}
  /* Continuation rows of a fixed-height card (Tree.itemHeight > 1): muted
     detail lines that select + highlight with their card's primary row. */
  .w-tree-xrow{padding:0 6px;white-space:pre;overflow:hidden;text-overflow:ellipsis;cursor:default;border-radius:3px;color:var(--muted)}
  .w-tree-xrow.sel{background:var(--menuhi);color:#dfe8ff}
  .w-overlay{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
    box-shadow:0 10px 34px rgba(0,0,0,.5);padding:4px;margin:2px 0;z-index:4;position:relative}
  .w-list-cards{gap:4px;padding:2px}
  .w-list-card{border:1px solid var(--border);border-radius:6px;padding:3px 6px;cursor:default;background:rgba(255,255,255,.02)}
  .w-list-card.sel{border-color:var(--accent);background:var(--menuhi)}
  .w-list-card .w-section{border:none;padding:0}
  /* native Settings (full modal) */
  /* Use ~80% of the viewport on large screens; keep the old 960×640-capped
     size as a floor so small windows behave exactly as before. */
  .settings-modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:96;width:max(min(960px,90vw),80vw);height:max(min(640px,86vh),80vh);
    background:#2b2b2b;border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
  .settings-modal .set-title{padding:5px 12px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border)}
  .settings-modal .set-body{flex:1;display:flex;overflow:hidden}
  .settings-modal .set-cats{width:210px;flex:0 0 auto;overflow:auto;border-right:1px solid var(--border);padding:4px 0}
  .settings-modal .set-cats.focus,.settings-modal .set-items.focus{box-shadow:inset 0 0 0 1px var(--accent)}
  .settings-modal .set-cat{padding:2px 10px;white-space:nowrap;cursor:default} .settings-modal .set-cat.sel{background:var(--menuhi);color:#fff}
  .settings-modal .set-cat-sec{padding:1px 10px;color:var(--muted)}
  .settings-modal .set-items{flex:1;overflow:auto;padding:4px 0}
  .settings-modal .set-section{padding:6px 14px 2px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .settings-modal .set-item{padding:4px 14px;border-bottom:1px solid rgba(255,255,255,.04)} .settings-modal .set-item.sel{background:var(--menuhi)}
  .settings-modal .set-item.ro{opacity:.6}
  .settings-modal .set-item-head{display:flex;align-items:center;gap:12px}
  .settings-modal .set-name{flex:1;min-width:0} .settings-modal .set-desc{color:var(--muted);white-space:normal;margin-top:1px}
  .settings-modal .set-ctl-wrap{flex:0 0 auto;max-width:50%;text-align:right;display:flex;justify-content:flex-end;align-items:center}
  .settings-modal .set-ctl{display:inline-flex;align-items:center;gap:4px}
  .settings-modal .set-ctl.set-dim{color:var(--muted);font-style:italic}
  /* toggle switch */
  .settings-modal .set-switch{width:26px;height:14px;border-radius:8px;background:#555;position:relative;display:inline-block;transition:background .1s}
  .settings-modal .set-switch::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#ccc;transition:left .1s}
  .settings-modal .set-switch.on{background:var(--accent)} .settings-modal .set-switch.on::after{left:14px;background:#fff}
  /* number stepper */
  .settings-modal .set-step{display:inline-block;width:18px;text-align:center;border:1px solid #5a5a5a;border-radius:3px;cursor:default}
  .settings-modal .set-num-v{min-width:34px;text-align:center}
  /* dropdown pill + text field */
  .settings-modal .set-pill{padding:1px 8px;border:1px solid #5a5a5a;border-radius:4px;background:var(--bg)}
  .settings-modal .set-field{padding:1px 8px;border:1px solid #5a5a5a;border-radius:4px;background:var(--bg);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .settings-modal .set-dd{position:absolute;background:var(--bg2);border:1px solid #5a5a5a;border-radius:4px;max-height:200px;overflow:auto;margin-top:2px;z-index:3}

  /* native auxiliary modals (keybindings / event-debug / theme-info) */
  .auxmodal{z-index:96;background:#2b2b2b;border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;max-height:80vh}
  .auxmodal.centered{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);min-width:520px;max-width:80vw}
  .auxmodal.anchored{position:absolute;min-width:240px}

  /* floating / dock widget panel surfaces (native plugin UI). The surface is
     a column flex box and the LIST inside it is the scroll container (flex:1;

     scrolls only the session/workspace list while the header chrome (title,
     buttons, filter) stays put. `overflow:auto` on the surface itself is only
     the fallback for list-less panels taller than their rect; when a list is
     present the flex chain makes the content fit exactly, so the surface

  .widget-surface{background:var(--bg2);overflow:auto;z-index:40;padding:4px 6px;
    display:flex;flex-direction:column}
  .widget-surface>.w-col,.widget-surface>.w-row{flex:1 1 auto;min-height:0}
  .widget-surface .w-list,.widget-surface .w-tree{flex:1 1 auto;min-height:0;overflow-y:auto}

  .widget-surface.w-floatingModal{border:1px solid #5a5a5a;border-radius:8px;box-shadow:0 16px 60px rgba(0,0,0,.55);z-index:96}

  .widget-surface .w-col{gap:3px}
  /* --- Plugin dialog polish (New Folder, etc.) ---------------------------
     A floating modal whose root is a labeledSection is a small dialog. Give
     it a clean card: the section owns the padding (so its border doesn't
     double up with the modal frame), a titled header rule, roomy vertical
     rhythm, a real input field, and right-aligned buttons. Scoped with
     :has()/`>` so the big new-session form (root .w-col) is untouched. */
  .widget-surface.w-floatingModal:has(> .w-section){padding:0}

  .w-floatingModal>.w-section>.w-section-label{font-weight:600;color:var(--fg);
    margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--hairline,var(--border))}
  .w-floatingModal>.w-section>.w-col{gap:14px}

  :root{--r-sm:6px;--r-md:9px;--r-lg:12px}

     accent rule on the bottom edge — a clear indicator even when active/inactive
     share a bg (as high-contrast does). */
  .tabbar{background:var(--surface)}
  .tab{background:transparent;position:relative}
  .tab.active{background:var(--surface-2)}
  /* Bottom accent rule (drawn as an inset element so it sits above the tabbar's
     own bottom hairline and reads crisply on both themes). */
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:var(--accent);border-radius:2px 2px 0 0}

  /* ---- shared inline-SVG icons (file explorer) ---- */
  .ficon{width:14px;height:14px;display:block;flex:0 0 auto}
  .fileexplorer .fx-icon{display:inline-flex;align-items:center;flex:0 0 auto}
  /* Explorer icons: quietly muted; folders take the accent so the tree structure
     reads at a glance. Selected rows flip to --on-sel via currentColor. */
  .fileexplorer .fx-icon{color:var(--muted)}
  .fileexplorer .fx-icon.dir{color:var(--accent)}
  .fileexplorer .fx-row.sel .fx-icon{color:var(--on-sel)}
  .fileexplorer .fx-row .fx-name{min-width:0}

  /* ---- status bar: subtle rounded pills on the interactive segments ---- */
  .statusbar .seg{border-radius:var(--r-sm);transition:background .12s ease}
  .statusbar .seg:hover{background:color-mix(in srgb,var(--status-fg) 18%,transparent)}

  /* ---- reconnect pill (client WS state, fixed corner) ---- */
  #reconnect{position:fixed;right:12px;bottom:10px;z-index:98;display:none;
    align-items:center;gap:8px;padding:5px 12px 5px 11px;border-radius:999px;
    font-weight:600;color:var(--fg);
    background:var(--surface);border:1px solid var(--hairline-strong);
    box-shadow:var(--shadow)}
  #reconnect.show{display:inline-flex}
  #reconnect .rc-label{color:var(--fg);letter-spacing:.01em}
  /* Pulsing status dot — a solid core plus an expanding ring, tinted with the
     theme accent (no hardcoded warning red; stays legible on light + dark). */
  #reconnect .rc-dot{position:relative;width:9px;height:9px;flex:0 0 auto;
    border-radius:50%;background:var(--accent)}
  #reconnect .rc-dot::after{content:"";position:absolute;inset:0;border-radius:50%;
    background:var(--accent);animation:rc-ping 1.25s cubic-bezier(0,0,.2,1) infinite}
  @keyframes rc-ping{0%{transform:scale(1);opacity:.65}80%,100%{transform:scale(2.6);opacity:0}}

  /* ---- native text selection (hold Alt) ----
     While Alt is held the browser owns the mouse (see the natsel capture
     guards): user-select comes back on so drag/double-click build a REAL
     browser selection over any text — buffer SVG, live terminals, file
     explorer, every chrome panel. Line-number gutters stay unselectable so
     a drag across a pane copies code, not line numbers (the bridge emits
     the gutter as its own block precisely for this). */
  body.natsel, body.natsel *{user-select:text !important;-webkit-user-select:text !important}
  body.natsel .region{cursor:text}
  body.natsel .pane-gutter, body.natsel .pane-gutter *{user-select:none !important;-webkit-user-select:none !important}
  /* Theme-tinted highlight; ::selection has no effect while user-select is
     none, and the highlight survives releasing Alt until the next click. */
  ::selection{background:color-mix(in srgb, var(--accent) 45%, transparent)}
  #natsel{position:fixed;left:12px;bottom:10px;z-index:98;display:none;
    align-items:center;gap:8px;padding:5px 12px 5px 11px;border-radius:999px;
    font-weight:600;color:var(--fg);
    background:var(--surface);border:1px solid var(--hairline-strong);
    box-shadow:var(--shadow)}
  #natsel.show{display:inline-flex}
  #natsel .rc-label{color:var(--fg);letter-spacing:.01em}
  #natsel .rc-dot{width:9px;height:9px;flex:0 0 auto;border-radius:50%;background:var(--accent)}

  /* Breathing room: a touch more horizontal padding and even gaps in the
     natively-flowed lists (kept near one cell tall so the editor's row window
     still lines up). */
  .palette .prow{padding:4px 14px}
  .palette .plist{padding:6px 0}
  .popup .popup-body{padding:3px 0}
  .popup .popup-row{padding:2px 12px}
  .ctxmenu{padding:5px 0}
  .ctxmenu .ctxitem{padding:3px 14px}
  .fileexplorer .fx-title{padding:6px 10px 4px}
  .settings-modal .set-cat{padding:3px 12px}
  .settings-modal .set-item{padding:6px 16px}

  .settings-modal .set-list-row{min-width:0;gap:10px}

  /* Slim, rounded, low-contrast scrollbars that match the hairline language. */
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:var(--hairline-strong);border-radius:8px;
    border:3px solid transparent;background-clip:padding-box}
  *::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--fg) 38%,transparent);background-clip:padding-box}
  *::-webkit-scrollbar-track{background:transparent}
  .scrollbar .thumb{background:var(--hairline-strong);border-radius:8px}
  .scrollbar .thumb:hover{background:color-mix(in srgb,var(--fg) 38%,transparent)}

  /* Focus as a soft ring rather than a hard 1px outline. */
  .w-toggle.focus,.w-button.focus,.kbedit .kb-search.focus,.w-text.focus{outline:none;
    box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 55%,transparent)}

  /* ----------------------------------------------------------------------
     Selection pills. The old edge-to-edge highlight blocks become inset,
     rounded "pills" with a faint top-down sheen: each scrolling list gets a
     small side gutter and every row a matching radius, so only the selected
     row paints — floating clear of the panel edge. Rows keep the same box
     whether selected or not, so the text never shifts as selection moves.
     ---------------------------------------------------------------------- */
  :root{--sel:linear-gradient(180deg, color-mix(in srgb,var(--menuhi) 86%, var(--fg)), var(--menuhi))}
  .fileexplorer .fx-list{padding:4px 6px}
  .palette .plist{padding:6px 6px}
  .popup .popup-body{padding:4px 6px}
  .ctxmenu{padding:5px 6px}
  .settings-modal .set-cats{padding:6px 6px}
  .settings-modal .set-items{padding:6px 8px}
  .kbedit .kb-table{padding:0 6px}
  .settings-modal .set-dual-list{padding:2px 4px}
  .w-list{padding:0 2px}

  .fileexplorer .fx-row,.palette .prow,.popup .popup-row,.ctxmenu .ctxitem,
  .settings-modal .set-cat,.settings-modal .set-cat-sec,.kbedit .kb-row:not(.kb-head),
  .settings-modal .set-dual-row,.w-list-row{border-radius:7px}
  .fileexplorer .fx-row{margin:1px 0}
  /* Settings rows: drop the per-row hairline divider in favour of spacing and a
     rounded selection, the way modern settings panes read. */
  .settings-modal .set-item{border-bottom:0;border-radius:9px;margin:1px 0}

  /* The sheen + rounded fill for every selected/highlighted row. */
  .fileexplorer .fx-row.sel,.palette .prow.sel,.popup .popup-row.sel,
  .ctxmenu .ctxitem.sel,.settings-modal .set-cat.sel,.settings-modal .set-item.sel,
  .kbedit .kb-row.sel,.settings-modal .set-dual-row.sel,.w-list-row.sel,
  .auxmodal .am-line.sel{background:var(--sel)}
  /* Menu dropdown highlight: gently rounded to match (items stay cell-pinned). */
  .mitem{border-radius:7px}
  .mitem.hi{background:var(--sel)}

  /* ======================================================================
     Theme-faithful floating chrome (light & dark). The base rules above were
     authored for a dark palette: hardcoded #2b2b2b/#252526 panels, #5a5a5a
     borders, and white text on the highlight pill. Re-point them at the live
     theme surfaces and the luminance-picked --on-sel so a LIGHT theme reads
     correctly instead of dark panels with invisible/white-on-light text.
     One block, later in source order, so it wins without touching the base.
     ====================================================================== */
  /* Floating panel fills → theme surfaces (menu = menuBg to match the bar;
     popups/modals = popupBg; header/overlay bands = elevated surfaces). */
  .dropdown{background:var(--bg3)}
  .popup{background:var(--bg2)}
  .popup .popup-title{background:var(--surface-2)}
  .trustdialog,.auxmodal,.kbedit,.settings-modal,
  .widget-surface.w-floatingModal{background:var(--bg2)}
  .settings-modal .set-overlay,.kbedit .kb-overlay{background:var(--surface-2)}
  .kbedit .kb-row.kb-head{background:var(--surface)}
  /* Inner-control borders (buttons, fields, steppers, pills, dropdowns, the
     key chip) → the hairline language instead of a fixed grey. */
  .trustdialog .td-btn,.w-button,.palette .prow .pkey,
  .settings-modal .set-step,.settings-modal .set-pill,.settings-modal .set-field,
  .settings-modal .set-dd,.settings-modal .set-dual-btn,.settings-modal .btn,
  .settings-modal .set-overlay,.kbedit .kb-btn,.kbedit .kb-overlay{
    border-color:var(--hairline-strong)}
  /* Primary text on the menuHi / --sel highlight pill → readable in any theme. */
  .menu.open,.mitem.hi,.mitem.hi .lab,
  .palette .prow.sel,.palette .prow.sel .pkey,
  .fileexplorer .fx-row.sel,.fileexplorer .fx-row.sel .fx-chev,
  .popup .popup-row.sel,.ctxmenu .ctxitem.sel,.trustdialog .td-opt.sel,
  .w-list-row.sel,.settings-modal .set-cat.sel,.settings-modal .set-dual-row.sel,
  .settings-modal .set-sresult.sel,.kbedit .kb-row.sel,.kbedit .kb-field.focus,
  .kbedit .kb-chip.on,.auxmodal .am-line.sel{color:var(--on-sel)}
  /* Secondary text on selected rows → a muted shade of the on-sel colour
     (the old #dfe8ff light-blue vanished on a light highlight). */
  .mitem.hi .accel,.palette .prow.sel .pdesc,.popup .popup-row.sel .pdetail,
  .trustdialog .td-opt.sel .td-odesc,.kbedit .kb-field.focus .kb-field-l{
    color:color-mix(in srgb,var(--on-sel) 62%,transparent)}
  .palette .prow.sel .pkey{border-color:color-mix(in srgb,var(--on-sel) 45%,transparent)}
  /* Text on accent-filled controls the base still leaves white but the earlier
     polish block didn't cover. */
  .kbedit .kb-ac-row.sel{color:var(--on-accent)}
  /* Tab close-button hover → a stronger fill than the tab-body hover so the ×
     reads as its own target even while the whole tab is also hover-lifted. */
  .tab .x:hover{background:var(--hairline-strong);color:var(--fg)}

  /* ======================================================================
     Mobile / portrait touch shell. Gated entirely by body.mobile (set in JS
     from a max-width media query), so the desktop layout is untouched. The
     editor keeps its cell grid — JS just reports fewer rows so the pane ends
     above the bottom stack, and a 36px header sits over the two hidden chrome
     rows (menu+tab) so the pane lines up with no offset math. Desktop cell
     chrome is hidden and replaced with native touch bars.
     ====================================================================== */
  #mobile{display:none}
  body.mobile #mobile{display:block}
  body.mobile .menubar,body.mobile .tabbar,body.mobile .statusbar,
  body.mobile .scrollbar,body.mobile .thumb,body.mobile .separator,
  body.mobile .resize-grip{display:none!important}

  /* Header: logo · filename · search / run / overflow. Overlays the two hidden
     top chrome rows (=36px), so the editor pane starts cleanly beneath it. */
  .m-header{position:fixed;top:0;left:0;right:0;height:36px;z-index:88;display:flex;
    align-items:center;gap:8px;padding:0 8px;background:var(--surface-2);
    border-bottom:1px solid var(--hairline);box-shadow:0 1px 6px rgba(0,0,0,.3)}
  .m-logo{display:flex;align-items:center;gap:5px;font-weight:700;color:var(--fg);white-space:nowrap}
  .m-logo .m-spark{color:var(--accent)}
  .m-file{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    color:var(--muted)}
  .m-icon{flex:0 0 auto;width:30px;height:28px;display:flex;align-items:center;justify-content:center;
    border-radius:var(--r-sm);color:var(--fg);font-size:1.15em}
  .m-icon:active{background:var(--hover)}
  .m-icon.on{color:var(--on-accent);background:var(--accent)}
  /* Invisible capture input that raises/dismisses the native soft keyboard.
     Kept inside the viewport (not off-screen) so focusing it doesn't scroll;
     16px font avoids iOS zoom-on-focus. */
  #m-kbinput{position:fixed;left:0;bottom:var(--m-bottom,124px);width:1px;height:1px;
    opacity:0;border:0;padding:0;margin:0;font-size:16px;z-index:-1}

  /* Overflow (kebab) sheet, anchored under the header on the right. */
  .m-sheet{position:fixed;top:40px;right:6px;z-index:92;min-width:210px;background:var(--surface);
    border:1px solid var(--hairline);border-radius:var(--r-md);box-shadow:var(--shadow);padding:5px}
  .m-sheet .m-sheet-item{padding:9px 12px;border-radius:var(--r-sm);color:var(--fg);
    display:flex;align-items:center;gap:10px;white-space:nowrap}
  .m-sheet .m-sheet-item:active{background:var(--sel)}
  .m-sheet .m-sheet-ic{width:18px;text-align:center;color:var(--muted)}

  /* Bottom stack: coding-symbol accessory row · nav · status. Fixed; the editor
     grid is shortened by its height (--m-bottom) so no code hides behind it. */
  .m-bottom{position:fixed;left:0;right:0;bottom:0;z-index:88;background:var(--surface-2);
    border-top:1px solid var(--hairline)}
  .m-syms{display:flex;gap:6px;overflow-x:auto;padding:6px 8px;
    border-bottom:1px solid var(--hairline);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .m-syms::-webkit-scrollbar{display:none}
  .m-sym{flex:0 0 auto;min-width:32px;height:32px;padding:0 9px;display:flex;align-items:center;
    justify-content:center;line-height:1;
    color:var(--fg);background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-sm)}
  .m-sym:active{background:var(--hover)}
  .m-sym.m-save{margin-left:auto;color:var(--on-accent);background:var(--accent);
    border-color:var(--accent);font-weight:700;padding:0 16px}

  /* Termux-style modifier / navigation row (optional; toggled from overflow). */
  .m-mods{display:flex;gap:6px;overflow-x:auto;padding:6px 8px;
    border-bottom:1px solid var(--hairline);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .m-mods::-webkit-scrollbar{display:none}
  .m-mod{flex:0 0 auto;min-width:34px;height:32px;padding:0 11px;display:flex;align-items:center;
    justify-content:center;color:var(--fg);background:var(--surface);
    border:1px solid var(--hairline);border-radius:var(--r-sm)}
  .m-mod:active{background:var(--hover)}
  /* armed sticky modifier (Ctrl/Alt/Shift held for the next key) */
  .m-mod.m-modkey{font-weight:600}
  .m-mod.on{color:var(--on-accent);background:var(--accent);border-color:var(--accent);
    box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 45%,transparent)}

  .m-nav{display:flex;align-items:stretch}
  .m-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:7px 0 6px;color:var(--muted);border-radius:var(--r-sm)}
  .m-nav-item:active{background:var(--hover)}
  .m-nav-item .m-nav-ic{font-size:1.3em;line-height:1}
  .m-nav-item .m-nav-lb{letter-spacing:.02em}
  .m-nav-item.active{color:var(--accent)}

  .m-status{display:flex;align-items:center;gap:0;height:22px;padding:0 6px;
    border-top:1px solid var(--hairline);background:var(--surface);overflow-x:auto;
    scrollbar-width:none;white-space:nowrap}
  .m-status::-webkit-scrollbar{display:none}
  .m-status .m-seg{flex:0 0 auto;padding:0 7px;color:var(--muted)}
  .m-status .m-seg.trust{color:var(--accent)}

  /* Panels/overlays become full-width sheets between the header and bottom stack. */
  body.mobile .fileexplorer{position:fixed!important;left:0!important;top:36px!important;
    width:100vw!important;height:auto!important;bottom:var(--m-bottom,124px)!important;z-index:80;
    border-right:none;border-bottom:1px solid var(--hairline)}
  /* On mobile the palette is always a top-floating panel (never a true bottom
     sheet). Neutralise the centered-mode transform / caps so the explicit
     anchor here wins for both placement modes. */
  body.mobile .palette{left:3vw!important;width:94vw!important;top:7vh!important;
    bottom:auto!important;transform:none!important;max-width:none!important}
  /* Small-screen palette: grow into a near-full-height sheet as results fill
     it, sized in dvh so the browser toolbars (and, where the browser reports
     it, the on-screen keyboard) are accounted for — never overflowing a short
     viewport. Drop the desktop list-height floor (it would overflow a phone),
     WRAP long command rows instead of hard-clipping the description, give rows
     finger-sized padding, and hide the keyboard-shortcut pills (dead weight on
     a touch device). */
  body.mobile .palette.centered{top:3dvh!important;max-height:92dvh!important}
  body.mobile .palette.centered .plist{min-height:0!important;max-height:78dvh!important}
  /* width:auto cancels the desktop `width:max-content` (which makes rows scroll
     horizontally) so the row instead fills the viewport width and WRAPS. */
  body.mobile .palette .prow{flex-wrap:wrap;align-items:flex-start;padding:8px 14px;row-gap:1px;width:auto}
  body.mobile .palette .prow .ptext{flex:1 1 100%}
  body.mobile .palette .prow .pdesc{flex:1 1 100%;white-space:normal;overflow:visible;text-overflow:clip}
  body.mobile .palette .prow .pkey{display:none}
  body.mobile .settings-modal,body.mobile .kbedit{left:2vw!important;right:2vw!important;
    width:96vw!important;top:42px!important;bottom:calc(var(--m-bottom,124px) + 6px)!important;
    height:auto!important;max-height:none!important;transform:none!important}
  body.mobile .settings-modal .set-cats{width:128px}
  body.mobile .kbedit .kb-context,body.mobile .kbedit .kb-source{display:none}
  body.mobile .kbedit .kb-key{width:11ch}
  body.mobile .kbedit .kb-action{width:18ch}

  /* ---- show full text: opt out of the remaining chrome truncation ----
     Tabs and the prompt input line are fixed at the source now (they honour the
     TUI's own cell geometry). The elements below have no distinct server rect to
     size to, so we simply turn off the `text-overflow:ellipsis` the layout used
     as a space-saver — WITHOUT disturbing hit-testing or layout:
       - Hit-testing is unaffected either way. Every overlay row forwards its own
         precomputed LOGICAL cell (col/row from the server rect), never a
         pixel-derived one, and onChrome() keeps the grid's pixel->cell handler
         off these elements. Nothing here reads element geometry.
       - So the only thing to protect is visual layout: overflowing text must
         never push a sibling or spill past a non-clipping parent. Two safe
         shapes are used. (A) grow inside a parent that already clips/scrolls;
         (B) stay flex-shrinkable and clip (no ellipsis) when the box is truly
         too small. Nothing wraps — every row stays a single line so it keeps
         mapping 1:1 to the editor's row model. */

  /* (A) File-tree and palette rows size to their content; the panel — which
     already scrolls vertically — now also scrolls horizontally to reveal it,
     so the full text is reachable and stays inside the panel box. */
  .fileexplorer .fx-list{overflow:auto}
  .fileexplorer .fx-row{width:max-content;min-width:100%}
  .fileexplorer .fx-row .fx-name{overflow:visible;text-overflow:clip}
  .palette .plist{overflow:auto}
  .palette .prow{width:max-content;min-width:100%}
  .palette .prow .pdesc{overflow:visible;text-overflow:clip}

  /* (B) Everything else: drop the ellipsis and any hard width cap, but keep the
     element flex-shrinkable and clipped, so a long value shows in full when the
     box has room yet can never push its neighbours (status-bar segments, the
     palette count, dialog controls) or spill out of its box when it doesn't. */
  .statusbar .txt,
  .fileexplorer .fx-title,
  .trustdialog .td-path,
  .w-list-row,
  .settings-modal .set-field,
  .settings-modal .set-dual-row,
  .kbedit .kb-cfg,
  .kbedit .kb-col,
  .kbedit .kb-footer,
  .popup .popup-title,
  .popup .popup-desc,
  .popup .popup-row .pdetail,
  .m-file{min-width:0;overflow:hidden;text-overflow:clip;max-width:none}

  /* ======================================================================
     Design refresh — navy/teal "orchestrator" skin (target mock, 2026-07).
     The frame chrome (sidebar / menubar / tabs / status bar) sits on the
     darker --shell surface so the editor reads as the bright center pane;
     floating chrome becomes frosted glass over the code; every selection is
     a translucent teal pill with a hairline teal ring; keybindings render as
     key chips. Buffer cells stay 100% theme-driven and NO geometry changes —
     this layer only re-skins surfaces, fills and rules.
     ====================================================================== */
  :root{--r-lg:14px;
    --sel:linear-gradient(90deg,
      color-mix(in srgb, var(--ui-accent) 26%, transparent),
      color-mix(in srgb, var(--ui-accent) 10%, transparent));
    --sel-ring:inset 0 0 0 1px color-mix(in srgb, var(--ui-accent) 45%, transparent)}

  /* Frame chrome on the shell surface. */
  .menubar,.tabbar,.fileexplorer,.widget-surface.w-dock{background:var(--shell)}
  .fileexplorer .fx-title{font-weight:700;letter-spacing:.08em}

  /* Status bar: a quiet dark strip (no solid accent fill), muted text, and a
     live-connection dot on the far left like the design's "connection" pill —
     the reconnect pill takes over whenever the socket actually drops. */
  .statusbar{background:var(--shell);color:var(--muted);border-top:1px solid var(--hairline)}
  .statusbar .txt{color:var(--fg)}
  .statusbar .seg:hover{background:var(--hover);color:var(--fg)}
  .statusbar::before{content:"";align-self:center;width:7px;height:7px;flex:0 0 auto;
    margin-right:4px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 6px color-mix(in srgb, var(--ok) 70%, transparent)}

  /* Tabs on the shell; the active tab merges with the editor surface below
     it and carries a thin teal rule on its top edge. */
  .tab{color:var(--muted)}
  .tab.active{background:var(--bg);color:var(--fg)}
  .tab.active::after{top:0;bottom:auto;background:var(--ui-accent);border-radius:0 0 2px 2px}

  /* Floating chrome: frosted glass over the code (the backdrop blur is what
     makes the mock's palette read as a pane of smoked glass). */
  .dropdown,.popup,.ctxmenu,.palette,.m-sheet{
    background:color-mix(in srgb, var(--bg2) 74%, transparent);
    -webkit-backdrop-filter:blur(22px) saturate(1.15);
    backdrop-filter:blur(22px) saturate(1.15)}
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .dropdown,.popup,.ctxmenu,.palette,.m-sheet{background:var(--bg2)}}

  /* Palette card: bold title band, transparent input row, roomier rows, and
     key chips on the right of each row. */
  .palette .ptitle{font-weight:700;color:var(--fg);border-bottom:none;padding:10px 16px 2px}
  .palette .pinput{background:transparent;padding:8px 16px}
  .palette .prow{padding:5px 14px}
  .palette .prow .pkey{padding:1px 8px;border-radius:6px;line-height:1.25;
    background:color-mix(in srgb, var(--fg) 6%, transparent)}

  /* Search-option toggle chips (Case / Whole Word / Regex / Confirm-each). */
  .psearchopts{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:7px 10px 5px}
  .psopt{display:inline-flex;align-items:center;gap:7px;padding:2px 10px;
    border:1px solid var(--hairline-strong);border-radius:999px;color:var(--muted);cursor:default}
  .psopt:hover{background:var(--hover)}
  .psopt .psbox{width:13px;height:13px;flex:0 0 auto;border:1px solid var(--hairline-strong);
    border-radius:4px;display:inline-flex;align-items:center;justify-content:center;
    font-size:.72em;line-height:1;color:transparent}
  .psopt.on{color:var(--fg);border-color:color-mix(in srgb, var(--ui-accent) 50%, transparent);
    background:color-mix(in srgb, var(--ui-accent) 10%, transparent)}
  .psopt.on .psbox{background:var(--ui-accent);border-color:var(--ui-accent);color:var(--on-ui-accent)}
  .psopt .pskey{color:var(--muted);border:1px solid var(--hairline);border-radius:5px;
    padding:0 5px;line-height:1.25;background:color-mix(in srgb, var(--fg) 5%, transparent)}

  /* Selections: one language — translucent teal pill + hairline teal ring.
     Text on them is the plain theme foreground (--on-sel), never white-on-X. */
  .fileexplorer .fx-row.sel,.palette .prow.sel,.popup .popup-row.sel,
  .ctxmenu .ctxitem.sel,.settings-modal .set-cat.sel,.settings-modal .set-item.sel,
  .kbedit .kb-row.sel,.settings-modal .set-dual-row.sel,.w-list-row.sel,
  .auxmodal .am-line.sel,.mitem.hi,.trustdialog .td-opt.sel,
  .settings-modal .set-sresult.sel,.kbedit .kb-field.focus{
    background:var(--sel);box-shadow:var(--sel-ring)}
  .menu.open{background:var(--sel);color:var(--fg)}
  .settings-modal .set-dd-row.sel,.kbedit .kb-ac-row.sel{
    background:var(--sel);box-shadow:var(--sel-ring);color:var(--fg)}

  /* The dock's selected card is the signature moment: a soft teal glow
     radiating from its left edge (the mock's highlighted project card). */
  .w-list-card.sel{
    border-color:color-mix(in srgb, var(--ui-accent) 55%, transparent);
    background:
      radial-gradient(120% 140% at 0% 50%,
        color-mix(in srgb, var(--ui-accent) 22%, transparent), transparent 70%),
      color-mix(in srgb, var(--ui-accent) 7%, transparent);
    box-shadow:0 0 18px color-mix(in srgb, var(--ui-accent) 18%, transparent)}

  /* Solid fills and accent marks speak the chrome teal (the theme's --accent
     is the CURSOR colour — white in the stock dark theme — so it can't brand
     the chrome). --on-ui-accent keeps their labels readable. */
  .settings-modal .set-switch.on,.w-button.primary,.settings-modal .btn.primary,
  .trustdialog .td-btn.primary,.m-icon.on,.m-sym.m-save,.m-mod.on{
    background:var(--ui-accent);border-color:var(--ui-accent);color:var(--on-ui-accent)}
  .settings-modal .set-switch.on::after{background:var(--on-ui-accent)}
  .kbedit .kb-btn.focus{background:var(--ui-accent);border-color:var(--ui-accent);color:var(--on-ui-accent)}
  .m-mod.on{box-shadow:0 0 0 2px color-mix(in srgb, var(--ui-accent) 45%, transparent)}
  .w-toggle.on,.w-hint b,.m-logo .m-spark,.m-nav-item.active,
  .settings-modal .set-section,.settings-modal .set-list-badge,
  .settings-modal .set-list-add,.settings-modal .set-search,
  .kbedit .kb-search b,.kbedit .kb-row.kb-section,
  .fileexplorer .fx-icon.dir{color:var(--ui-accent)}
  .separator:hover,.resize-grip:hover{background:var(--ui-accent)}
  .settings-modal .set-dual-col.active{border-color:color-mix(in srgb, var(--ui-accent) 55%, transparent)}
  #reconnect .rc-dot,#reconnect .rc-dot::after{background:var(--ui-accent)}

  /* Focus rings in the same teal. */
  .w-toggle.focus,.w-button.focus,.kbedit .kb-search.focus,.w-text.focus{
    box-shadow:0 0 0 2px color-mix(in srgb, var(--ui-accent) 55%, transparent)}
  .settings-modal .set-cats.focus,.settings-modal .set-items.focus{
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--ui-accent) 55%, transparent)}
</style>
</head>
<body>
<div id="app"></div>
<div id="mobile"></div>
<div id="err"></div>
<div id="reconnect" role="status" aria-live="polite"><span class="rc-dot"></span><span class="rc-label">Reconnecting…</span></div>
<div id="natsel" role="status" aria-live="polite"><span class="rc-dot"></span><span class="rc-label">Select text — drag, then Ctrl+C</span></div>

<script>
"use strict";
// --------------------------------------------------------------------------
// Real-render client. NO local model and NO re-implemented layout: the server
// runs the real Editor::render and reports the cell grid for buffer interiors
// plus the *semantic* chrome model (menu tree, tabs, status segments) the
// pipeline already computed. Buffer interiors are drawn as cells; chrome is
// drawn as native HTML. Every chrome interaction is sent back to the real
// Editor::handle_mouse at the cell coords the pipeline reported.
// Transport: one WebSocket — the server pushes region-diff frames whenever
// the scene changes (no client polling), and all input rides the same socket.
// --------------------------------------------------------------------------
let scene = null;
// ---- typography metrics: measured, not constant (docs §3.3) ----------------
// The cell size is derived from a canvas measureText of the SAME monospace
// stack the SVG renders with, at the current (zoomed) font size — not from a
// hardcoded constant. CW = measured glyph advance × CELL_AIR, where CELL_AIR
// is the shipped grid's cell/advance ratio (8.2px cells over the 7.83px
// advance the original hardcoded CW was tuned against), so zoom 1.0 renders
// pixel-identical to the old constants while a differently-resolved font (or
// a future user font setting) still re-derives the whole grid from its own
// measurement. CH keeps the shipped 18/13 line-height:font-size ratio. All
// cell↔pixel mapping (place/px/cellAt/cellsSvg/caret/resize) reads these
// lets, so one measureMetrics() + render() + resize() retunes the entire UI.
// `zoom` (Ctrl+= / Ctrl+- / Ctrl+0, Ctrl+wheel — frontend-owned, see the
// keydown handler) multiplies the base font size; it is a pure view
// preference persisted in localStorage (same class as mShowMods), never
// editor state — the editor only sees the resulting cols/rows re-fit.
// Family and base size come from the CSS custom properties (--font-family /
// --font-size-base) so the stylesheet stays the single place typography is
// declared: the same family and size the chrome inherits are what the cell grid
// is measured with.
const rootCss = getComputedStyle(document.documentElement);
const FONT_STACK = rootCss.getPropertyValue("--font-family").trim()
  || "ui-monospace,SFMono-Regular,JetBrains Mono,Menlo,Consolas,monospace";
const BASE_FONT = parseFloat(rootCss.getPropertyValue("--font-size-base")) || 13;  // CSS px at zoom 1.0
const CELL_AIR = 1.0477;          // cell width / glyph advance (see above)
let zoom = 1;
try{ const z=parseFloat(localStorage.getItem("fresh.zoom")); if(z>=0.5&&z<=3) zoom=z; }catch(_){}
let FONT = BASE_FONT, CW = 8.2, CH = 18;   // refined by measureMetrics()
const measureCtx = document.createElement("canvas").getContext("2d");
function measureMetrics(){
  FONT = Math.round(BASE_FONT*zoom*100)/100;
  measureCtx.font = FONT+"px "+FONT_STACK;
  const adv = measureCtx.measureText("M0".repeat(60)).width/120;  // per-cell advance
  CW = adv>0 ? Math.round(adv*CELL_AIR*100)/100 : 8.2*zoom;       // canvas-less fallback
  CH = Math.round(FONT*(18/13)*100)/100;
  // Publish the zoomed size back to CSS: chrome sizes itself in em off
  // --font-size, so the native UI scales with the buffer instead of staying
  // pinned at the unzoomed base.
  document.documentElement.style.setProperty("--font-size", FONT+"px");
  // Font/cell alignment: the SVG buffer pins every glyph to a CW-pitch column,
  // but native chrome text flows at the font's *natural* advance (~CW/CELL_AIR),
  // so N characters of chrome were narrower than the N cells the TUI budgeted
  // for them — which is why chrome boxes sized to a server cell-rect couldn't
  // hold their own text. Add exactly the missing tracking (CW − advance) as
  // letter-spacing so one chrome glyph advances one cell, matching the grid.
  const advNat = adv>0 ? adv : CW/CELL_AIR;
  document.documentElement.style.setProperty("--cell-tracking", (Math.round((CW-advNat)*1000)/1000)+"px");
}
measureMetrics();
function setZoom(z){
  z = Math.round(Math.min(3,Math.max(0.5,z))*100)/100;
  if(z===zoom) return;
  zoom = z;
  try{ localStorage.setItem("fresh.zoom",String(z)); }catch(_){}
  measureMetrics();
  if(scene) render();   // re-place everything at the new metrics now…
  resize();             // …then the editor re-fits cols/rows to the new cell size
}
// Command-palette placement — a pure frontend view preference (same class as
// `zoom` / `mShowMods`), persisted in localStorage, never editor state.
// `true`  → float the palette as a centered modal over the whole view (a
//           `.modal-scrim` dims the dock / explorer / buffers behind it);
// `false` → keep the terminal-style sheet hugging the bottom of the grid.
// The editor is unaffected either way: row clicks/scroll still route through
// its logical suggestion cell rect, so only the pixels move. Toggle with the
// frontend-owned Ctrl/Cmd+Alt+P chord or the mobile ⋮ sheet.
let paletteCentered = true;
try{ if(localStorage.getItem("fresh.palette.centered")==="0") paletteCentered=false; }catch(_){}
function setPaletteCentered(on){
  on=!!on;
  if(on===paletteCentered) return;
  paletteCentered=on;
  try{ localStorage.setItem("fresh.palette.centered", on?"1":"0"); }catch(_){}
  if(scene) render();
}
// Browser zoom or a monitor move changes devicePixelRatio without any event;
// the matchMedia re-arm pattern fires once per change — re-measure (rounding
// of the advance can shift with rasterization) and re-fit the grid.
(function armDpr(){
  matchMedia(`(resolution: ${devicePixelRatio}dppx)`)
    .addEventListener("change",()=>{ measureMetrics(); if(scene) render(); resize(); armDpr(); },{once:true});
})();

const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const px = (cells, sz) => (cells*sz);
function place(el, r){ el.style.left=px(r.x,CW)+"px"; el.style.top=px(r.y,CH)+"px"; el.style.width=px(r.w,CW)+"px"; el.style.height=px(r.h,CH)+"px"; }
function div(cls){ const d=document.createElement("div"); d.className=cls; return d; }
// cell coordinate to forward to the editor for a click on a chrome rect
const rectCell = r => ({ col: r.x + Math.floor(r.w/2), row: r.y });

// ---- shared inline-SVG icon set (tabs + file explorer) -------------------
// One source of truth. Feather/Lucide-style line glyphs, hand-authored (never
// fetched — the CSP blocks remote anything). All monochrome: fill:none +
// stroke:currentColor, so they inherit the element's theme text color (muted
// for inactive rows, --fg/--accent when active, --on-sel when selected). The
// wrapper carries class "ficon"; CSS sizes it (~14px) and aligns it to text.
const ICON_PATHS = {
  // document with a folded corner + a couple of text lines
  doc:      '<path d="M13 3H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9z"/><path d="M13 3v6h6"/>',
  docLines: '<path d="M13 3H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9z"/><path d="M13 3v6h6"/><path d="M8.5 13.5h7M8.5 17h4.5"/>',
  // </> code chevrons
  code:     '<path d="M10 8l-4 4 4 4"/><path d="M14 8l4 4-4 4"/>',
  // { } braces (config: json / toml)
  braces:   '<path d="M9 4c-1.6 0-2 .9-2 2v2c0 1.1-.6 2-2 2 1.4 0 2 .9 2 2v2c0 1.1.4 2 2 2"/><path d="M15 4c1.6 0 2 .9 2 2v2c0 1.1.6 2 2 2-1.4 0-2 .9-2 2v2c0 1.1-.4 2-2 2"/>',
  // # hash (stylesheets)
  hash:     '<path d="M9.5 4L7.5 20M16.5 4l-2 16M5 9.5h14M4.5 14.5h14"/>',
  // >_ terminal window (shell scripts)
  term:     '<rect x="3" y="4.5" width="18" height="15" rx="2"/><path d="M7 10l3 2.5-3 2.5M13 15h4"/>',
  // padlock (lockfiles)
  lock:     '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>',
  // closed / open folders
  folder:   '<path d="M3 6.5a2 2 0 0 1 2-2h3.6a1 1 0 0 1 .7.3L11 6.5h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
  folderOpen:'<path d="M3 7a2 2 0 0 1 2-2h3.6a1 1 0 0 1 .7.3L11 7h6a2 2 0 0 1 2 2v1H3z"/><path d="M3 10h17.2a1 1 0 0 1 .97 1.24l-1.5 6A1 1 0 0 1 18.7 18H5a2 2 0 0 1-2-2z"/>',
};
// extension → glyph key. Every requested extension is covered; unknown → doc.
const EXT_ICON = {
  rs:'code', ts:'code', tsx:'code', js:'code', jsx:'code', py:'code', go:'code', html:'code',
  json:'braces', toml:'braces',
  css:'hash', scss:'hash',
  sh:'term',
  lock:'lock',
  md:'docLines', txt:'docLines',
};
function iconSvg(key){
  return '<svg class="ficon" viewBox="0 0 24 24" fill="none" stroke="currentColor" '
    + 'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
    + (ICON_PATHS[key]||ICON_PATHS.doc) + '</svg>';
}
// Public helper: pick an icon for a name. dir → folder (open when expanded).
function fileIcon(name, opts){
  opts=opts||{};
  if(opts.dir) return iconSvg(opts.expanded?"folderOpen":"folder");
  const m=/\.([A-Za-z0-9]+)$/.exec(String(name||""));
  const ext=m?m[1].toLowerCase():"";
  return iconSvg(EXT_ICON[ext]||"doc");
}

// Vertical box-drawing glyphs the editor uses for the line-number gutter,
// tree guides and rules. Rendered as crisp full-height vector lines instead of
// the font glyph — stacked glyphs leave gaps at our cell height, so the gutter
// looked dashed; a rule per cell is contiguous row-to-row, i.e. one clean line.
const VRULE = "│┃";
// Draw a block of cells (rows of styled runs) as SVG <text>/<tspan>.
function cellsSvg(cells, wCells){
  let s=`<svg class="cells" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${px(wCells,CW)} ${px(cells.length,CH)}" preserveAspectRatio="xMinYMin slice" font-size="${FONT}">`;
  let rules="";   // vector vertical rules, drawn above the text layer
  for(let row=0; row<cells.length; row++){
    const y=(row+1)*CH - CH*(5/18);   // baseline: 5px up at the base 18px cell, scaled with it
    let col=0;
    for(const r of cells[row]){
      const ebg=r.r?(r.fg||"#d4d4d4"):r.bg;
      if(ebg){ s+=`<rect x="${(px(col,CW)).toFixed(1)}" y="${(row*CH).toFixed(1)}" width="${(px(r.t.length,CW)).toFixed(1)}" height="${CH}" fill="${ebg}"/>`; }
      col+=r.t.length;
    }
    s+=`<text y="${y.toFixed(1)}" xml:space="preserve">`;
    col=0;
    for(const r of cells[row]){
      const fill=r.r?(r.bg||"#1e1e1e"):(r.fg||"#d4d4d4");
      const weight=r.b?` font-weight="bold"`:"";
      const style=r.i?` font-style="italic"`:"";
      const deco=r.u?` text-decoration="underline"`:"";
      // Substitute vertical box-drawing chars with a vector rule: collect a
      // full-height line per cell, and blank the glyph in the text so only the
      // rule shows (no dashed glyph behind it).
      let shown=r.t;
      if([...r.t].some(ch=>VRULE.includes(ch))){
        for(let i=0;i<r.t.length;i++){ if(VRULE.includes(r.t[i])){
          const cx=px(col+i,CW)+CW/2;
          const hv=(r.t[i]==="┃"?1.8:1.1)*zoom;
          rules+=`<rect x="${(cx-hv/2).toFixed(2)}" y="${(row*CH).toFixed(1)}" width="${hv}" height="${CH}" fill="${fill}"/>`;
        }}
        shown=[...r.t].map(ch=>VRULE.includes(ch)?" ":ch).join("");
      }
      // Pin EVERY glyph to its exact cell column via a per-character x list.
      // The font's glyph advance isn't exactly CW, so relying on natural advance
      // (or even textLength stretching, which distributes spacing differently
      // for a short highlighted run than for the long run it was part of) lets
      // glyphs drift when run boundaries change — e.g. toggling occurrence /
      // current-line highlights re-split runs and visibly nudged the text. A
      // hard x per cell makes column position independent of run grouping.
      let xs="";
      for(let i=0;i<shown.length;i++){ xs+=(i?" ":"")+px(col+i,CW).toFixed(1); }
      s+=`<tspan x="${xs}" fill="${fill}"${weight}${style}${deco}>${esc(shown)}</tspan>`;
      col+=r.t.length;
    }
    s+=`</text>`;
  }
  s+=rules;
  s+=`</svg>`;
  return s;
}

// Seed the chrome CSS variables from the editor's active theme so the native
// HTML matches the terminal palette (instead of a fixed dark scheme). Each var
// falls back to its :root default when the theme leaves a color at terminal
// "reset" (null).
function applyTheme(t){
  if(!t) return;
  const r=document.documentElement.style;
  const set=(k,v)=>{ if(v) r.setProperty(k,v); else r.removeProperty(k); };
  set("--bg",t.bg); set("--fg",t.fg); set("--accent",t.accent);
  set("--muted",t.muted); set("--bg2",t.popupBg); set("--bg3",t.menuBg);
  set("--menuhi",t.menuHi); set("--border",t.border);
  set("--status-bg",t.statusBg); set("--status-fg",t.statusFg);
  // Pick black/white text for fills painted in the accent / menu-highlight color
  // by luminance, so a control filled with a light accent (e.g. high-contrast's
  // white cursor) still shows its label instead of white-on-white.
  const onColor=hex=>{ const m=/^#?([0-9a-fA-F]{6})$/.exec((hex||"").trim()); if(!m) return null;
    const n=parseInt(m[1],16), lin=c=>{c/=255; return c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);};
    const L=.2126*lin((n>>16)&255)+.7152*lin((n>>8)&255)+.0722*lin(n&255);
    return L>.45?"#10131a":"#ffffff"; };
  set("--on-accent", onColor(t.accent));
  // Selected rows are a translucent --ui-accent tint over the panel surface
  // (not a solid menuHi fill), so the readable text colour on them is simply
  // the theme foreground.
  set("--on-sel", t.fg);
  // Frame-chrome surface: pull the buffer bg toward deep navy. Dark themes get
  // the design's near-black navy shell; light themes only a gently shaded
  // frame (same hue pull, ratio picked by bg luminance). Null bg (terminal
  // reset) falls back to the :root color-mix default.
  const mix=(a,b,k)=>{ const pa=/^#?([0-9a-fA-F]{6})$/.exec((a||"").trim()),
      pb=/^#?([0-9a-fA-F]{6})$/.exec((b||"").trim());
    if(!pa||!pb) return null;
    const na=parseInt(pa[1],16), nb=parseInt(pb[1],16);
    const ch=s=>Math.round(((na>>s)&255)*(1-k)+((nb>>s)&255)*k);
    return "#"+[16,8,0].map(s=>ch(s).toString(16).padStart(2,"0")).join(""); };
  const darkBg = onColor(t.bg)==="#ffffff";
  set("--shell", mix(t.bg, "#060b13", darkBg?0.45:0.08));
}

// Selectors for natively-scrolled chrome whose scrollTop must survive a
// rebuild (otherwise a re-render would snap them back to the top). With
// per-region patching the snapshot/restore is scoped to the one region
// container actually being rebuilt — untouched regions keep their scroll
// positions by simply not being touched.
const SCROLL_KEEP = ".set-items,.set-cats,.w-list,.widget-surface";

// ---- per-region DOM patching (docs §3.4, the frontend half) ----------------
// Frames arrive as per-region diffs (see applyFrame), so the DOM is patched
// per region too: #app holds one stable display:contents container per region
// family, created once in EXACTLY the order the old monolithic rebuild
// appended elements (display:contents boxes don't exist for layout/stacking,
// so absolute positioning and paint order behave as if every element were
// still a direct child of #app — this changes update granularity, not
// geometry). Rebuilding a region = clearing and refilling only its container.
// Panes get one sub-container per pane index: a typing frame
// ("regions.panes.0") re-emits one pane's SVG and leaves every other DOM node
// untouched — scroll positions, caret blink phase and IME focus survive by
// construction instead of by snapshot/restore.
const REGION_ORDER = ["fileExplorer","panes","separators","menu","statusbar",
  "popups","palette","widgets","contextMenu","auxModal","keybindingEditor",
  "settings","trustDialog","caret"];
let containers=null;
let renderedRegions=[];   // region names rebuilt by the last render (test surface)
function contentsDiv(name){ const d=document.createElement("div"); d.style.display="contents"; d.dataset.region=name; return d; }
function ensureContainers(){
  const app=document.getElementById("app");
  if(containers && containers.caret.isConnected) return;
  app.textContent="";
  containers={};
  for(const n of REGION_ORDER){ const c=contentsDiv(n); app.appendChild(c); containers[n]=c; }
}

// One pane: native tab bar + buffer interior (real cells) + scrollbar (UI).
// The line-number gutter is rendered as its own element, separate from the
// buffer-text flow, so a future native text selection covers only the code
// (not the gutter/line-number column). Both are still real pipeline cells.
function fillPane(c,p){
  if(p.tabBar) c.appendChild(tabBarEl(p));
  const gw=p.gutterWidth||0;
  if(gw>0 && p.gutter){
    // Gutter (line numbers + separator) and buffer text are emitted as
    // separate cell blocks by the bridge — render them as separate elements.
    const g=div("region pane-gutter"); place(g,{x:p.content.x,y:p.content.y,w:gw,h:p.content.h});
    g.innerHTML=cellsSvg(p.gutter, gw); c.appendChild(g);
    const b=div("region pane-content"); place(b,{x:p.content.x+gw,y:p.content.y,w:p.content.w-gw,h:p.content.h});
    b.innerHTML=cellsSvg(p.cells, p.content.w-gw); c.appendChild(b);
  } else {
    const b=div("region pane-content"); place(b,p.content); b.innerHTML=cellsSvg(p.cells, p.content.w); c.appendChild(b);
  }
  if(p.vscroll && p.vscroll.w>0){
    const sb=div("region scrollbar"); place(sb,p.vscroll); c.appendChild(sb);
    const th=document.createElement("div"); th.className="thumb";
    th.style.top=px(p.thumbStart,CH)+"px"; th.style.height=Math.max(CH, px(Math.max(1,p.thumbEnd-p.thumbStart),CH))+"px";
    sb.appendChild(th);
  }
}
function renderPane(i){
  const host=containers.panes;
  if(!host.children[i]){ renderAllPanes(); return; }   // structure drifted → rebuild all
  const c=host.children[i]; c.textContent="";
  const p=scene.regions.panes[i]; if(p) fillPane(c,p);
}
function renderAllPanes(){
  const host=containers.panes, n=scene.regions.panes.length;
  while(host.children.length>n) host.lastChild.remove();
  while(host.children.length<n) host.appendChild(contentsDiv("pane"));
  for(let i=0;i<n;i++){ const c=host.children[i]; c.textContent="";
    const p=scene.regions.panes[i]; if(p) fillPane(c,p); }
}

// Live caret from the pipeline's real cursor cell (if inside a pane). Patched
// in place: when the caret cell didn't move, the existing element is KEPT so
// its blink animation phase doesn't restart on unrelated frames (the old full
// innerHTML rebuild restarted the blink on every frame).
function renderCaret(c,reg){
  let want=null;
  if(reg.cursor){
    const inPane=reg.panes.some(p=>p && reg.cursor.x>=p.content.x && reg.cursor.x<p.content.x+p.content.w && reg.cursor.y>=p.content.y && reg.cursor.y<p.content.y+p.content.h);
    if(inPane) want={left:px(reg.cursor.x,CW)+"px", top:px(reg.cursor.y,CH)+"px",
                     height:CH+"px", width:Math.max(1,Math.round(2*zoom))+"px"};
  }
  const old=c.firstChild;
  if(!want){ if(old) c.textContent=""; return; }
  if(old && old.style.left===want.left && old.style.top===want.top && old.style.height===want.height) return;
  c.textContent="";
  const el=div("caret"); Object.assign(el.style,want); c.appendChild(el);
}

// Region fillers: same element builders the old monolithic render() used,
// now targeted at one container each.
const REGION_FILL={
  // file explorer (UI pane; content = its real rows)
  fileExplorer(c,reg){ if(reg.fileExplorer) c.appendChild(fileExplorerEl(reg.fileExplorer)); },
  panes(){ renderAllPanes(); },
  // split borders
  separators(c,reg){ for(const s of reg.separators){
    const d=div("region separator");
    if(s.vertical) place(d,{x:s.x,y:s.y,w:1,h:s.len}); else place(d,{x:s.x,y:s.y,w:s.len,h:1});
    c.appendChild(d); } },
  // native menu bar + dropdown (one family: menuOpen/menuHighlight/submenuPath/
  // dropdown/menus all redraw together)
  menu(c,reg){ if(reg.menubar) c.appendChild(menuBarEl(reg));
    for(const d of menuDropdownEls(reg)) c.appendChild(d); },
  statusbar(c,reg){ if(reg.statusbar) c.appendChild(statusBarEl(reg.statusbar)); },
  // native popups (completion / hover / action / list / text) — semantic, not cells
  popups(c,reg){ for(const p of (reg.popups||[])) c.appendChild(popupEl(p)); },
  // native command palette / picker (semantic; routes back to the real editor).
  // paletteEls emits the card (with the live-grep / quick-open preview pane
  // rendered inside it, matching the TUI's single box) plus a `.modal-scrim`
  // behind it in centered-modal placement.
  palette(c,reg){ if(reg.palette) for(const el of paletteEls(reg.palette)) c.appendChild(el); },
  // native plugin widget panels (floating / dock)
  widgets(c,reg){ if(reg.widgets) for(const s of reg.widgets) for(const el of widgetSurfaceEls(s)) c.appendChild(el); },
  contextMenu(c,reg){ if(reg.contextMenu) c.appendChild(contextMenuEl(reg.contextMenu)); },
  auxModal(c,reg){ if(reg.auxModal) for(const el of auxModalEls(reg.auxModal)) c.appendChild(el); },
  keybindingEditor(c,reg){ if(reg.keybindingEditor) for(const el of keybindingEditorEls(reg.keybindingEditor)) c.appendChild(el); },
  settings(c,reg){ if(reg.settings) for(const el of settingsEls(reg.settings)) c.appendChild(el); },
  trustDialog(c,reg){ if(reg.trustDialog) for(const el of trustDialogEls(reg.trustDialog)) c.appendChild(el); },
  caret(c,reg){ renderCaret(c,reg); },
};
function renderRegion(name){
  const c=containers[name];
  // Snapshot scroll positions inside this region before its rebuild, keyed by
  // document-order ordinal (stable across a same-structure re-render).
  const saved=[]; c.querySelectorAll(SCROLL_KEEP).forEach((e,i)=>{ saved[i]=e.scrollTop; });
  if(name!=="caret") c.textContent="";     // the caret patches its own child in place
  REGION_FILL[name](c, scene.regions);
  c.querySelectorAll(SCROLL_KEEP).forEach((e,i)=>{ if(saved[i]) e.scrollTop=saved[i]; });
  if(name==="settings") settingsEnsureSelectionVisible(c);
  // A widgets rebuild replaces any focused text input — restore DOM focus
  // and caret to the host-focused field (or the hidden sink if none).
  if(name==="widgets") syncWidgetInputFocus();
}

// The TUI windows the settings rows with the core's scroll offset, so its
// selection is always on screen; the web renders the FULL list in native
// overflow:auto panels, and the snapshot/restore above deliberately pins the
// previous scrollTop. When a rebuild moves the selection (arrow keys past the
// fold, and especially a search jump: "/" + query + Enter lands anywhere in
// the tree while the restored scrollTop is from the results view), nudge each
// scrolled panel just enough to bring its selected row back into view. Runs
// after the scroll restore, and only when the row is actually outside the
// panel, so a user's own wheel position is otherwise left alone.
function settingsEnsureSelectionVisible(c){
  for(const sel of c.querySelectorAll(".set-cat.sel,.set-item.sel,.set-sresult.sel,.set-list-row.sel,.set-list-add.sel")){
    const list=sel.closest(".set-cats,.set-items,.set-overlay");
    if(!list) continue;
    const lr=list.getBoundingClientRect(), sr=sel.getBoundingClientRect();
    if(sr.top<lr.top||sr.bottom>lr.bottom) sel.scrollIntoView({block:"nearest"});
  }
}

// Full rebuild of every region container: hello (connect/reconnect), the HTTP
// refresh() resync, and w/h/theme changes (rare). Everything frame-driven goes
// through applyFrame's per-region patch path instead.
function render(){
  const app=document.getElementById("app");
  if(!scene){ containers=null; app.textContent="connecting to editor…"; return; }
  applyTheme(scene.theme);
  ensureContainers();
  for(const n of REGION_ORDER) renderRegion(n);
  renderedRegions=REGION_ORDER.slice();
  // Native touch shell on narrow/portrait viewports (desktop is untouched).
  document.body.classList.toggle("mobile", isMobile());
  renderMobileChrome(scene.regions);
}

// ---- native menu bar ----------------------------------------------------
function menuBarEl(reg){
  const rect=reg.menubar;            // menubar region IS the rect {x,y,w,h}
  const bar=div("region menubar"); place(bar,{x:rect.x,y:rect.y,w:rect.w,h:1});
  const barRow=rect.y;
  reg.menus.forEach((m,i)=>{
    // Visibility is decided once in the core (MenuEntry.visible, from the shared
    // is_menu_visible); skip hidden menus instead of re-deriving here.
    if(m.visible===false) return;
    const el=div("menu"+(reg.menuOpen===i?" open":""));
    el.textContent=m.label;
    // Position each title at its EDITOR cell x (not CSS flow), so the title sits
    // exactly where the editor hit-tests it and the dropdown — positioned at the
    // same cell coords — opens directly beneath it.
    if(m.x!=null){ el.style.position="absolute";
      el.style.left=px(m.x-rect.x,CW)+"px";
      if(m.w) el.style.width=px(m.w,CW)+"px";
      el.style.padding="0"; el.style.justifyContent="center"; }
    // forward to the real editor at the menu label's center cell -> it opens/toggles.
    const col=(m.x??rect.x)+Math.floor((m.w||1)/2);
    el.onmousedown=e=>{ e.preventDefault(); e.stopPropagation(); sendMouse({kind:"down",button:"left",col,row:barRow}); };
    // Hover switches menus only while one is open (mirrors the TUI). Uses the
    // menu's editor cell, and `mousemove` so a stationary cursor never fights
    // keyboard navigation.
    el.onmousemove=()=>{ if(reg.menuOpen!=null) hoverMove(col,barRow,"menu:"+i); };
    bar.appendChild(el);
  });
  return bar;
}

// Walk submenuPath to the items list shown at a given submenu depth (>=1).
function submenuItems(reg, depth){
  let items=reg.menus[reg.menuOpen]?.items||[];
  for(let d=0; d<depth; d++){
    const it=items[reg.submenuPath[d]];
    if(!it||it.kind!=="submenu") return [];
    items=it.items||[];
  }
  return items;
}

// One native dropdown row, positioned at the pipeline's cell rect.
// `hi` says whether the editor currently highlights this row.
function itemRow(item, rect, hi){
  if(!item) return null;
  if(item.kind==="sep"){ const s=div("msep"); place(s,rect); s.style.height="1px"; s.style.top=px(rect.y+0.5,CH)+"px"; return s; }
  if(item.kind==="label"){ const l=div("mlabel"); place(l,rect); l.style.lineHeight=CH+"px"; l.textContent=item.label; return l; }
  const cell=rectCell(rect);
  const row=div("mitem"+(hi?" hi":"")+(item.enabled===false?" disabled":""));
  place(row,rect); row.style.lineHeight=CH+"px";
  const check = item.checked===true?"✓":"";
  const arrow = item.kind==="submenu"?'<span class="arrow">›</span>':"";
  const accel = item.accel?`<span class="accel">${esc(item.accel)}</span>`:"";
  row.innerHTML=`<span class="lab"><span class="check">${check}</span>${esc(item.label)}</span>${accel}${arrow}`;
  // hover highlights via `mousemove` (never fires on a DOM rebuild under a
  // stationary cursor), so arrow-key navigation isn't reset by the mouse.
  row.onmousemove=()=>hoverMove(cell.col,cell.row,"item:"+cell.col+","+cell.row);
  row.onmousedown=e=>{ e.preventDefault(); e.stopPropagation();
    if(item.enabled===false) return;
    sendMouse({kind:"down",button:"left",col:cell.col,row:cell.row}); };
  return row;
}

function menuDropdownEls(reg){
  const out=[];
  if(reg.menuOpen==null || !reg.dropdown) return out;
  for(const grp of dropdownPanels(reg)) out.push(grp);      // solid backing panels
  const path=reg.submenuPath||[];
  // top-level items: highlighted = menuHighlight when no submenu is deeper,
  // otherwise the parent of the open submenu (path[0]).
  const items=reg.menus[reg.menuOpen]?.items||[];
  for(const di of reg.dropdown.items){
    const hi = path.length===0 ? di.index===reg.menuHighlight : di.index===path[0];
    const el=itemRow(items[di.index], di.rect, hi); if(el) out.push(el);
  }
  // expanded submenu levels
  for(const su of (reg.dropdown.submenus||[])){
    const list=submenuItems(reg, su.depth);
    const deepest = su.depth===path.length;
    const hi = deepest ? su.index===reg.menuHighlight : su.index===path[su.depth];
    const el=itemRow(list[su.index], su.rect, hi); if(el) out.push(el);
  }
  return out;
}

// Solid rounded panels behind the top-level dropdown and each submenu level,
// placed on the pipeline's full bordered box rects (`dropdown.rect` /
// `submenuBoxes`) — the same footprint the TUI border occupies, so the panel
// sits flush under the menu bar instead of leaving the border row as a gap.
